<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">

<head th:replace="~{layout :: head('Recovery Verification')}"></head>

<body class="auth-page">
    <div class="auth-wrapper">
        <div class="auth-card fade-in">
            <div class="auth-header" style="text-align: center; margin-bottom: 24px;">
                <div class="auth-logo"
                    style="display:flex; justify-content:center; align-items:center; gap:10px; margin-bottom:16px;">
                    <div class="logo-icon"
                        style="width: 42px; height: 42px; background: linear-gradient(135deg, var(--accent), var(--accent-dark)); border-radius: var(--radius-sm); display: flex; align-items: center; justify-content: center; font-size: 20px; box-shadow: var(--shadow-glow);">
                        🛡️</div>
                    <span class="logo-text" style="font-size: 20px; font-weight: 700;">Recovery Auth</span>
                </div>
                <h2 style="font-size: 1.5rem; margin-bottom: 8px;">Verify Identity</h2>
                <p class="auth-subtitle">A verification code has been sent to your registered email address.</p>
            </div>

            <div th:replace="~{layout :: flash}"></div>

            <form method="post" th:action="@{/recover/2fa}">
                <div class="form-group">
                    <label class="form-label" for="otp">Verification Code</label>
                    <input type="text" id="otp" name="otp" class="form-control" placeholder="6-digit code" required
                        autocomplete="off" autofocus />
                    <p class="text-sm text-muted mt-2">Check your inbox (and spam) for the code.</p>
                </div>

                <div style="margin-top: 24px;">
                    <button type="submit" class="btn btn-primary w-full" style="justify-content: center;">
                        ✅ Verify & Continue
                    </button>
                    <a href="/recover" class="btn btn-secondary w-full mt-2"
                        style="justify-content: center; text-decoration:none;">
                        Cancel
                    </a>
                </div>
            </form>
        </div>
    </div>

    <div th:replace="~{layout :: scripts}"></div>
</body>

</html>
